name                = "cf-base"
main                = ".svelte-kit/cloudflare/_worker.js"
compatibility_date  = "2026-02-26"
compatibility_flags = ["nodejs_als", "nodejs_compat"]

# ── Assets (SvelteKit Static Assets) ──────────────────────────────────────────
[assets]
binding   = "ASSETS"
directory = ".svelte-kit/cloudflare"

# ── Observabilidade ────────────────────────────────────────────────────────────
[observability]
enabled = true
[observability.logs]
head_sampling_rate = 1

# ── D1 Database ───────────────────────────────────────────────────────────────
[[d1_databases]]
binding       = "DB"
database_name = "cf-base-db"
database_id   = "8777b126-7409-4dee-bf99-e9f27ce624ec"
migrations_dir = "migrations"

# ── Durable Objects (Rate Limiter) ────────────────────────────────────────────
[[durable_objects.bindings]]
name       = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag                = "v1"
new_sqlite_classes = ["RateLimiter"]

# ── R2 Storage ────────────────────────────────────────────────────────────────
[[r2_buckets]]
binding     = "R2_BUCKET"
bucket_name = "cf-base-storage"

# ── Queues — REQUER PLANO PAGO (descomentar após activar Workers Paid plan) ──
# [[queues.producers]]
# binding = "BACKUP_QUEUE"
# queue   = "cf-base-backup-queue"

# [[queues.consumers]]
# queue             = "cf-base-backup-queue"
# max_batch_size    = 10
# max_batch_timeout = 30

# ── Cron Triggers ─────────────────────────────────────────────────────────────
# Meia-noite Europe/Lisbon (UTC+0/+1 — usar UTC 0 ou 23)
[triggers]
crons = ["0 0 * * *"]

# ── Variáveis não-secretas ────────────────────────────────────────────────────
[vars]
APP_ENV = "production"
APP_URL = "https://cf-base.acemang-jedi.workers.dev"

# ── SECRETS — NUNCA neste ficheiro — via: wrangler secret put <NAME> ──────────
# CSRF_SECRET      → openssl rand -hex 32  (min 64 hex chars)
# SESSION_SECRET   → openssl rand -hex 32  (min 64 hex chars)
# ENCRYPTION_KEY   → AES-256-GCM key (32 bytes hex)
# CF_ACCOUNT_ID    → Cloudflare Account ID
# CF_API_TOKEN     → Cloudflare API Token (Browser Rendering / PDF)
# SENTRY_DSN       → opcional — activa error monitoring se presente
