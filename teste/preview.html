<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolha de Cores - Mock</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Escolha suas cores</h1>
        
        <!-- Seção de paletas -->
        <div class="palette-container">
            <!-- Cards de Paletas -->
            <div class="palette-card" data-palette="paleta1">
                <div class="color-box" style="background-color: #4CAF50;"></div>
                <div class="color-box" style="background-color: #FF5722;"></div>
                <div class="color-box" style="background-color: #FFFFFF;"></div>
                <div class="color-box" style="background-color: #F4F4F4;"></div>
                <div class="color-box" style="background-color: #FF9800;"></div>
                <div class="color-box" style="background-color: #FFFFFF;"></div>
                <div class="color-box" style="background-color: #FFEB3B;"></div>
                <div class="color-box" style="background-color: #F44336;"></div>
                <span>Paleta 1</span>
            </div>

            <div class="palette-card" data-palette="paleta2">
                <div class="color-box" style="background-color: #2196F3;"></div>
                <div class="color-box" style="background-color: #FFC107;"></div>
                <div class="color-box" style="background-color: #FAFAFA;"></div>
                <div class="color-box" style="background-color: #E3F2FD;"></div>
                <div class="color-box" style="background-color: #673AB7;"></div>
                <div class="color-box" style="background-color: #FFFFFF;"></div>
                <div class="color-box" style="background-color: #FFEB3B;"></div>
                <div class="color-box" style="background-color: #F44336;"></div>
                <span>Paleta 2</span>
            </div>

            <div class="palette-card" data-palette="custom">
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <div class="color-box custom" style="background-color: #000000;"></div>
                <span>Paleta Customizada</span>
            </div>
        </div>
        
        <!-- Seção de demonstração da interface -->
        <div class="demo">
            <div class="card">
                <h2>Exemplo de Card</h2>
                <p>Texto informativo</p>
            </div>
            <button class="action-button">Ação</button>
            <div class="warning">Aviso Importante!</div>
            <div class="danger">Erro ao Processar!</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
