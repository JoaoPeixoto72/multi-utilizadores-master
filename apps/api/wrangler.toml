name = "cf-base-api"
main = "src/index.ts"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_als", "nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "cf-base-db"
database_id = "REPLACE-WITH-D1-DB-ID"
migrations_dir = "migrations"

[[durable_objects.bindings]]
name = "RATE_LIMITER"
class_name = "RateLimiter"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiter"]

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "cf-base-storage"

[triggers]
crons = ["0 0 * * *"]

[vars]
APP_ENV = "development"
APP_URL = "http://localhost:5173"
API_URL = "http://127.0.0.1:8787"

[env.production.vars]
APP_ENV = "production"
APP_URL = "https://app.teudominio.com"
API_URL = "https://app.teudominio.com/api"
