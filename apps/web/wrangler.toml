name = "arch-web"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_als", "nodejs_compat"]

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[observability]
enabled = true

[vars]
PUBLIC_API_URL = "https://arch-api-production.acemang-jedi.workers.dev"
APP_ENV = "production"
