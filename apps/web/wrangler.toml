name = "arch-web"
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2026-03-05"
compatibility_flags = ["nodejs_als", "nodejs_compat"]

[assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[observability]
enabled = true

# ============================================================
# DEFAULT — wrangler dev (local)
# Service binding aponta para arch-api a correr localmente
# ============================================================
[vars]
APP_ENV = "development"

[[services]]
binding = "API"
service = "arch-api"

# ============================================================
# STAGING — wrangler deploy --env staging
# ============================================================
[env.staging.vars]
APP_ENV = "staging"

[env.staging.assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[env.staging.services]]
binding = "API"
service = "arch-api-staging"

# ============================================================
# PRODUCTION — wrangler deploy --env production
# ============================================================
[env.production.vars]
APP_ENV = "production"

[env.production.assets]
directory = ".svelte-kit/cloudflare"
binding = "ASSETS"

[[env.production.services]]
binding = "API"
service = "arch-api-production"
